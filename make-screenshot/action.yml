name: 'Make Screenshot'
description: 'Load the theme in Emacs and make a screenshot'
inputs:
  file-name:
    description: 'The file name in which to output the screenshot'
    required: true
  theme-name:
    descriptoin: 'The name of the theme to load'
    required: true
  width:
    description: 'The width of the screenshot'
    required: true
    default: 896
  height:
    description: 'The height of the screenshot'
    required: true
    default: 576
  depth:
    description: 'The color-depth for the screenshot'
    required: true
    default: 24
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - --width
    - ${{ inputs.width }}
    - --height
    - ${{ inputs.height }}
    - --depth
    - ${{ inputs.depth }}
    - --
    - --output
    - ${{ inputs.file-name }}
    - --name
    - ${{ inputs.theme-name }}
